name: outliner
manifest:
  functions:
    autoBullet:
      path: ./outliner.ts:autoBullet
      events:
        - editor:pageModified
    toggleOutliner:
      path: ./outliner.ts:toggleOutliner
      command:
        name: "Outliner: Toggle Mode"
        key: "Ctrl-Alt-o"
        requireMode: rw
        requireEditor: page
